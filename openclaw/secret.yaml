apiVersion: v1
kind: Secret
metadata:
  name: openclaw-secrets
  labels:
    app: openclaw
type: Opaque
data:
  # Replace these with your own base64-encoded values
  # Generate with: echo -n 'your-value' | base64
  OPENCLAW_TELEGRAM_TOKEN: <base64-encoded-value>
  ANTHROPIC_API_KEY: <base64-encoded-value>
  DISCORD_BOT_TOKEN: <base64-encoded-value>
